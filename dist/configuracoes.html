<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech web</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="flex min-h-screen flex-col md:flex-row">
    <aside
        class="flex w-full overflow-x-auto bg-emerald-900 border-b border-gray-300 font-semibold md:w-64 md:min-h-screen md:flex-col md:justify-between md:items-center md:overflow-visible md:border-b-0 md:border-r">
        <div class="flex flex-row flex-nowrap gap-4 p-5 md:flex-col md:gap-0">
            <div class="flex shrink-0 flex-row items-center justify-center">
                <img src="images/engrenagem.png" alt="icone-engrenagem" class="h-5 w-5 object-cover md:h-7 md:w-7">
                <a href="" class="m-5 font-sans text-white">Configurações</a>
            </div>

            <div class="flex shrink-0 flex-row items-center justify-center">
                <img src="images/dinheiro.png" alt="icone-engrenagem"
                    class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7">
                <a href="" class="m-5 font-sans text-white">Movimentações</a>
            </div>

            <div class="flex shrink-0 flex-row items-center justify-center mr-15 ml-5">
                <img src="images/dashboard.png" alt="icone-engrenagem"
                    class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7">
                <a href="" class="m-5 font-sans text-white">Dashboard</a>
            </div>
        </div>

        <a href=""
            class="shrink-0 self-center rounded-full border border-red-700 bg-red-800 px-5 py-2 text-sm font-semibold text-white shadow-md shadow-red-950/20 transition-all duration-200 hover:-translate-y-0.5 hover:bg-red-700 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-300 focus:ring-offset-2 active:translate-y-0 active:scale-95 md:m-5 md:px-6 md:py-2 md:text-base">
            Sair
        </a>
    </aside>

    <main class="flex flex-col flex-1 bg-white min-h-screen">
        <nav class="flex flex-row justify-between bg-white pt-6 border border-gray-300 pb-5">
            <img src="images/notificacao.png" alt="icone-notificacao"
                class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7 ml-8 mt-5">

            <img src="images/logo.png" alt="logo" class="h-8 mt-3 w-48 md:h-11 md:w-68">
            <div class="flex flex-row gap-3">
                <h1 class="mt-5">Olá!</h1>
                <img src="images/profile.png" alt="imagem-perfil"
                    class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7 mr-8 mt-5">
            </div>
        </nav>

        <div class="flex flex-col flex-1 items-center justify-center p-4">
            <section
                class="flex flex-col items-center gap-8 w-full max-w-3xl rounded-2xl bg-white border border-gray-300 p-10 mt-6 md:flex-row">

                <h2 class="mb-2 md:mb-80">Perfil</h2>
                <div id="profile" class="flex w-40 flex-col items-center gap-3 mr-3">
                    <img src="images/profile.png" alt="imagem-perfil"
                        class="h-20 w-20 rounded-full object-cover md:h-28 md:w-28">

                    <label for="foto-perfil"
                        class="cursor-pointer rounded-full bg-emerald-900 px-5 py-2 text-center text-sm font-semibold text-white shadow-md shadow-emerald-900/25 transition-all duration-200 hover:-translate-y-0.5 hover:bg-emerald-800 hover:shadow-lg focus-within:outline-none focus-within:ring-2 focus-within:ring-emerald-300 focus-within:ring-offset-2 active:translate-y-0 active:scale-95">
                        Selecionar foto
                    </label>

                    <input id="foto-perfil" name="foto-perfil" type="file" accept="image/*" class="hidden">
                </div>

                <form class="flex w-full flex-1 flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label for="nome">Nome completo</label>
                        <input id="nome" type="text" placeholder="Digite seu nome"
                            class="w-full rounded-md border border-gray-300 p-3">
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="Digite seu email"
                            class="w-full rounded-md border border-gray-300 p-3">
                    </div>

                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex flex-1 flex-col gap-1">
                            <label for="telefone">Telefone</label>
                            <input id="telefone" type="tel" placeholder="Digite seu telefone"
                                class="w-full rounded-md border border-gray-300 p-3">
                        </div>

                        <div class="flex flex-1 flex-col gap-1">
                            <label for="idioma">Idioma</label>
                            <select id="idioma" name="idioma" class="w-full rounded-md border border-gray-300 p-3">
                                <option value="pt-br">Português</option>
                                <option value="en">Inglês</option>
                                <option value="es">Espanhol</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit"
                        class="mt-4 w-full rounded-xl border border-emerald-700 bg-emerald-900 p-3 font-bold text-white shadow-lg shadow-emerald-900/25 transition-all duration-200 hover:-translate-y-0.5 hover:bg-emerald-800 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:ring-offset-2 active:translate-y-0 active:scale-[0.99]">
                        Salvar informações
                    </button>
                </form>
            </section>

            <div id="modo-escuro"
                class="flex w-full max-w-3xl flex-row items-center justify-between rounded-2xl border border-gray-300 bg-white p-4 m-3 shadow-sm transition-colors duration-200 hover:border-emerald-300">
                <span class="font-medium text-gray-700">Modo escuro</span>

                <label for="darkModeToggle" class="relative inline-flex h-8 w-16 cursor-pointer items-center">

                    <input id="darkModeToggle" type="checkbox" class="sr-only peer">
                    <span
                        class="absolute inset-0 rounded-full bg-gray-300 shadow-inner transition-colors duration-300 peer-checked:bg-emerald-900 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-emerald-300 peer-focus:ring-offset-2"></span>
                    <span
                        class="absolute left-1 top-1 flex h-6 w-6 items-center justify-center rounded-full bg-white text-xs font-bold text-gray-500 shadow-md transition-all duration-300 peer-checked:translate-x-8 peer-checked:text-emerald-900">☾</span>
                </label>


            </div>
        </div>
    </main>

</body>

</html>
