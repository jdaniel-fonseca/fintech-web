<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech web</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="flex min-h-screen flex-col md:flex-row">
    <aside class="w-full md:w-64 bg-emerald-900 border border-gray-300">
        <div class="flex flex-row justify-center mt-5">
            <img src="images/engrenagem.png" alt="icone-engrenagem"
                class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7 mt-5">
            <h3 class="m-5 font-sans text-white">Configurações</h3>
        </div>
    </aside>

    <main class="flex flex-col flex-1 bg-amber-100 min-h-screen">
        <nav class="flex flex-row justify-between bg-amber-50 pt-6 border border-gray-300">
            <img src="images/notificacao.png" alt="icone-notificacao"
                class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7 ml-8 mt-5">

            <img src="images/logo.png" alt="logo" class="h-10 w-42 md:h-20 md:w-62">
            <div class="flex flex-row gap-3">
                <h1 class="mt-5">Olá!</h1>
                <img src="images/profile.png" alt="imagem-perfil"
                    class="h-5 w-5 rounded-full object-cover md:h-7 md:w-7 mr-8 mt-5">
            </div>
        </nav>

        <div class="flex flex-1 items-center justify-center p-4">
            <section class="flex flex-col items-center gap-8 w-full max-w-3xl rounded-2xl bg-amber-100 border border-gray-300 p-10 mt-6 md:flex-row">

                <div id="profile" class="flex w-40 flex-col items-center gap-3">
                        <img src="images/profile.png" alt="imagem-perfil"
                            class="h-20 w-20 rounded-full object-cover md:h-28 md:w-28">

                        <label for="foto-perfil"
                            class="cursor-pointer rounded-md bg-emerald-900 px-4 py-2 text-center text-white">
                            Selecionar foto
                        </label>

                        <input id="foto-perfil" name="foto-perfil" type="file" accept="image/*" class="hidden">
                    </div>

                <form class="flex w-full flex-1 flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label for="nome">Nome completo</label>
                        <input id="nome" type="text" placeholder="Digite seu nome"
                            class="w-full rounded-md border border-gray-300 p-3">
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="Digite seu email"
                            class="w-full rounded-md border border-gray-300 p-3">
                    </div>

                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex flex-1 flex-col gap-1">
                            <label for="telefone">Telefone</label>
                            <input id="telefone" type="tel" placeholder="Digite seu telefone"
                                class="w-full rounded-md border border-gray-300 p-3">
                        </div>

                        <div class="flex flex-1 flex-col gap-1">
                            <label for="idioma">Idioma</label>
                            <select id="idioma" name="idioma" class="w-full rounded-md border border-gray-300 p-3">
                                <option value="pt-br">Português</option>
                                <option value="en">Inglês</option>
                                <option value="es">Espanhol</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit"
                        class="mt-4 w-full bg-emerald-900 text-white rounded-md border border-gray-300 p-3 font-bold">
                        Salvar informações
                    </button>
                </form>
            </section>
            
        </div>
    </main>

</body>

</html>
